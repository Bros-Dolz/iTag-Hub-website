<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" role="img" aria-label="iTag Hub Find screen, dark theme">
  <!-- device -->
  <rect x="2" y="2" width="296" height="596" rx="46" fill="#000000"/>
  <rect x="12" y="12" width="276" height="576" rx="36" fill="#161310"/>
  <rect x="120" y="22" width="60" height="12" rx="6" fill="#000000"/>

  <!-- app bar: back + title -->
  <path d="M31 52l-7 8 7 8" fill="none" stroke="#E9E7E1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="44" y="67" font-family="Nunito, Segoe UI, sans-serif" font-size="20" font-weight="800" fill="#E9E7E1">Find House Keys</text>

  <!-- status badge (horizontally centered, with top margin; fixed mint pill, matching the app) -->
  <rect x="98" y="90" width="104" height="24" rx="12" fill="#E6F7F1"/>
  <circle cx="116" cy="102" r="4" fill="#1C9C78"/>
  <text x="126" y="106" font-family="Nunito Sans, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#1C9C78">Connected</text>

  <!-- radar (pulse rings + disc + tag avatar) -->
  <g>
    <circle cx="150" cy="272" r="98" fill="none" stroke="#9B95E8" stroke-width="3" opacity="0.14"/>
    <circle cx="150" cy="272" r="78" fill="none" stroke="#9B95E8" stroke-width="3" opacity="0.28"/>
    <circle cx="150" cy="272" r="58" fill="none" stroke="#9B95E8" stroke-width="3" opacity="0.44"/>
    <circle cx="150" cy="272" r="42" fill="#4A4660"/>
    <circle cx="150" cy="272" r="35" fill="#524D95"/>
    <g transform="translate(150,272) scale(1.6) translate(-12,-12)" fill="#9B95E8" fill-rule="evenodd">
      <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
    </g>
  </g>

  <!-- proximity text -->
  <text x="150" y="422" text-anchor="middle" font-family="Nunito, Segoe UI, sans-serif" font-size="26" font-weight="800" fill="#E9E7E1">Right here!</text>
  <text x="150" y="448" text-anchor="middle" font-family="Nunito Sans, Segoe UI, sans-serif" font-size="14" fill="#A39A8C">Within arm's reach</text>

  <!-- ring button -->
  <rect x="36" y="524" width="228" height="52" rx="16" fill="#9B95E8"/>
  <g transform="translate(82,550)">
    <path d="M-9 -3.5H-5L0 -7V7L-5 3.5H-9Z" fill="#fff"/>
    <path d="M2.5 -3.5A4.5 4.5 0 0 1 2.5 3.5" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M5 -6.5A7.5 7.5 0 0 1 5 6.5" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="108" y="556" font-family="Nunito, Segoe UI, sans-serif" font-size="16" font-weight="800" fill="#ffffff">Ring House Keys</text>
</svg>
